name: ci.yml

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
      - 'hotfix/*'
  pull_request:
    branches:
      - main
      - develop
      - 'release/*'
      - 'hotfix/*'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group app --group dev --frozen

      - name: Run Ruff Check (Linting)
        run: uv run ruff check app/ ai_worker/ tests/

      - name: Run Ruff Format Check
        run: uv run ruff format app/ ai_worker/ tests/ --check

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: healthguide
          POSTGRES_PASSWORD: healthguide_local_pw
          POSTGRES_DB: healthguide_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U healthguide"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group app --group dev --frozen

      - name: Check if tests exist
        id: check_tests
        run: |
          if [ $(find app/tests -name "test_*.py" 2>/dev/null | wc -l) -gt 0 ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Tests with Coverage
        if: steps.check_tests.outputs.has_tests == 'true'
        env:
          APP_ENV: local
          APP_DEBUG: "true"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: healthguide
          DB_PASSWORD: healthguide_local_pw
          DB_NAME: healthguide_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET_KEY: ci-test-secret-key
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run coverage run -m pytest app/tests -v --tb=short
          uv run coverage report -m
