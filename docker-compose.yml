version: "3.9"

services:
  # ─────────── PostgreSQL ───────────
  postgres:
    image: postgres:16-alpine
    container_name: hg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-healthguide}
      POSTGRES_USER: ${DB_USER:-healthguide}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-healthguide123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-healthguide}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────── Redis ───────────
  redis:
    image: redis:7-alpine
    container_name: hg-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────── FastAPI App ───────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hg-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      VLLM_BASE_URL: http://vllm:8000
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  # ─────────── vLLM (GPU) ───────────
  vllm:
    image: vllm/vllm-openai:latest
    container_name: hg-vllm
    restart: unless-stopped
    profiles:
      - gpu
    environment:
      - VLLM_MODEL_NAME=${VLLM_MODEL_NAME:-}
    command: >
      --model ${VLLM_MODEL_NAME:-} --host 0.0.0.0 --port 8000 --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.8} --tensor-parallel-size ${VLLM_TENSOR_PARALLEL_SIZE:-1} --max-model-len 4096 --trust-remote-code
    ports:
      - "8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    volumes:
      - model_cache:/root/.cache/huggingface
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  pg_data:
  redis_data:
  model_cache:
