# docker-compose.yml
# ──────────────────────────────────────────────
# HealthGuide 전체 서비스 스택
# docker compose up -d --build 로 실행
# GPU 사용 시: docker compose --profile gpu up -d --build
# ──────────────────────────────────────────────

services:
  # ── PostgreSQL 데이터베이스 ──
  db:
    image: postgres:16-alpine
    container_name: healthguide-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-healthguide}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-healthguide_local_pw}
      POSTGRES_DB: ${DB_NAME:-healthguide_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-healthguide}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (캐시 + 작업 큐) ──
  redis:
    image: redis:7-alpine
    container_name: healthguide-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI API 서버 ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthguide-app
    restart: unless-stopped
    env_file:
      - envs/.local.env
    environment:
      # 컨테이너 안에서는 서비스명으로 접근 (localhost 오버라이드)
      - DB_HOST=db
      - REDIS_HOST=redis
      # OpenAI API Key 명시 전달 (env_file에서 로드되지만 컨테이너 실행 시 오버라이드 가능하도록 명시)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/code/app
      - ./scripts:/code/scripts

