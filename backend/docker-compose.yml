# docker-compose.yml
# ──────────────────────────────────────────────
# HealthGuide 로컬 개발 환경
# - worker 없이 --reload 핫 리로드 사용
# - volumes 마운트로 코드 변경 즉시 반영
# docker compose up -d --build
# ──────────────────────────────────────────────

services:
  # ── PostgreSQL + pgvector ──
  db:
    image: pgvector/pgvector:pg16
    container_name: healthguide-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-healthguide}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-healthguide_local_pw}
      POSTGRES_DB: ${DB_NAME:-healthguide_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-healthguide} -d ${DB_NAME:-healthguide_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: healthguide-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI API 서버 (로컈: --reload, worker 1개) ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthguide-app
    restart: unless-stopped
    env_file:
      - envs/.local.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/code/app
      - ./scripts:/code/scripts
      - ./ai_worker:/code/ai_worker
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1", "--reload"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx ──
  nginx:
    image: nginx:1.27-alpine
    container_name: healthguide-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
