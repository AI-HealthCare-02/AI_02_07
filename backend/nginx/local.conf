upstream healthguide_api {
    server app:8000;
}

# 일반 API: IP당 20r/s
limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
# AI 분석 API (비용 제어): IP당 2r/s
limit_req_zone $binary_remote_addr zone=api_ai:10m rate=2r/s;
# SSE 챗봇: IP당 5r/s
limit_req_zone $binary_remote_addr zone=api_sse:10m rate=5r/s;

server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;

    location ~* \.(php|asp|aspx|jsp|cgi)$ { return 444; }
    location ~* /(vendor|phpunit|eval-stdin|wp-admin|wp-login|xmlrpc) { return 444; }

    location /health {
        proxy_pass http://healthguide_api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    location /ws/ {
        proxy_pass http://healthguide_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SSE 챗봇 전용
    location /api/v1/chat/send {
        limit_req zone=api_sse burst=5 nodelay;

        proxy_pass http://healthguide_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # AI 분석 API 전용 (비용 제어)
    location ~ ^/api/v1/(medical-doc/analyze|pill-analysis/analyze) {
        limit_req zone=api_ai burst=3 nodelay;

        proxy_pass http://healthguide_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # 일반 API
    location /api/ {
        limit_req zone=api_general burst=30 nodelay;

        proxy_pass http://healthguide_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }
}
