# nginx/default.conf
# ──────────────────────────────────────────────
# HealthGuide Nginx 리버스 프록시 설정
# HTTP → FastAPI 서버로 프록시
# HTTPS 설정은 certbot.sh 실행 후 자동 추가
# ──────────────────────────────────────────────

# ── 업스트림 정의 ──
upstream healthguide_api {
    # docker-compose에서 app 서비스의 컨테이너명
    # 여러 인스턴스로 스케일링 시 서버 추가 가능
    server app:8000;
}

# ── Rate Limiting ──
# API 남용 방지: IP당 초당 10 요청으로 제한
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;  # 프로덕션에서는 실제 도메인으로 교체

    # ── 최대 업로드 크기 ──
    # 의료 문서, 알약 이미지 업로드를 위해 넉넉하게 설정
    client_max_body_size 50M;

    # ── 해킹 스캔 차단 (PHP/알려진 취약점 탐색 시도) ──
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
    location ~* /(vendor|phpunit|eval-stdin|wp-admin|wp-login|xmlrpc) {
        return 444;
    }

    # ── 헬스체크 (로드밸런서용) ──
    location /health {
        proxy_pass http://healthguide_api/health;
        proxy_set_header Host $host;
    }

    # ── API 프록시 ──
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://healthguide_api;

        # 프록시 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) 지원을 위한 설정
        # 버퍼링을 끄고 타임아웃을 늘려야 SSE가 정상 동작합니다
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE 연결 유지
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # ── 정적 파일 (프론트엔드 빌드 파일) ──
    # 프론트엔드가 별도 서버라면 이 블록 제거
    # location / {
    #     root /usr/share/nginx/html;
    #     try_files $uri $uri/ /index.html;
    # }

    # ── Let's Encrypt 인증서 갱신용 ──
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

