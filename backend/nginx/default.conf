upstream healthguide_api {
    server app:8000;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── 해킹 스캔 차단 ──
    location ~* \.(php|asp|aspx|jsp|cgi)$ { return 444; }
    location ~* /(vendor|phpunit|eval-stdin|wp-admin|wp-login|xmlrpc) { return 444; }

    # ── 헬스체크 ──
    location /health {
        proxy_pass http://healthguide_api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── WebSocket 프록시 ──
    location /ws/ {
        proxy_pass http://healthguide_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── API 프록시 (SSE 포함) ──
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://healthguide_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 지원
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # ── Let's Encrypt 인증서 갱신용 ──
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

