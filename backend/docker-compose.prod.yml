# docker-compose.prod.yml
# ──────────────────────────────────────────────
# EC2 프로덕션 배포용
# docker compose -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────

services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    container_name: healthguide-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-healthguide}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-healthguide_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ws
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-healthguide}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: healthguide-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ws
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI 서버 ──
  app:
    image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:app-${APP_VERSION}
    container_name: healthguide-app
    restart: unless-stopped
    env_file: envs/.prod.env
    networks:
      - ws
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── AI Worker (현재 미사용 - GPU 인스턴스 필요 시 활성화) ──
  # ai_worker:
  #   image: ${DOCKER_USER}/${DOCKER_REPOSITORY}:worker-${AI_WORKER_VERSION}
  #   container_name: healthguide-worker
  #   restart: unless-stopped
  #   env_file: envs/.prod.env
  #   networks:
  #     - ws
  #   depends_on:
  #     redis:
  #       condition: service_healthy

  # ── Nginx ──
  nginx:
    image: nginx:1.27-alpine
    container_name: healthguide-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod_http.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - ws
    depends_on:
      - app

  # ── Certbot (SSL 자동 갱신) ──
  certbot:
    image: certbot/certbot
    container_name: healthguide-certbot
    restart: unless-stopped
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_www:
    driver: local

networks:
  ws:
    driver: bridge
