# docker-compose.prod.yml
# ──────────────────────────────────────────────
# EC2 t3.medium 프로덕션 배포용 (vCPU 2, RAM 4GB, Disk 30GB)
# docker compose -f docker-compose.prod.yml up -d --build
# ──────────────────────────────────────────────

services:
  # ── PostgreSQL (~400MB) ──
  db:
    image: postgres:16-alpine
    container_name: healthguide-db
    restart: unless-stopped
    env_file: envs/.prod.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ws
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-healthguide}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis (~128MB) ──
  redis:
    image: redis:7-alpine
    container_name: healthguide-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ws
    deploy:
      resources:
        limits:
          memory: 192m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── DB 마이그레이션 (배포 시 1회 실행 후 종료) ──
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: envs/.prod.env
    command: ["python", "-m", "app.services.db_init_service"]
    networks:
      - ws
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── FastAPI 서버 (uvicorn worker 2개, ~600MB) ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthguide-app
    restart: unless-stopped
    env_file: envs/.prod.env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    networks:
      - ws
    deploy:
      resources:
        limits:
          memory: 768m
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── AI Worker (concurrency 2, ~400MB) ──
  ai_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: healthguide-worker
    restart: unless-stopped
    env_file: envs/.prod.env
    command: ["python", "-m", "ai_worker.main"]
    networks:
      - ws
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx (~64MB) ──
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: healthguide-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - ws
    deploy:
      resources:
        limits:
          memory: 128m
    depends_on:
      - app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Certbot (SSL 자동 갱신) ──
  certbot:
    image: certbot/certbot
    container_name: healthguide-certbot
    restart: unless-stopped
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_www:
    driver: local

networks:
  ws:
    driver: bridge
